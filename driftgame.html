<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>RACER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:monospace; touch-action:none; }
body { display:flex; align-items:center; justify-content:center; }
#wrapper { position:relative; transform-origin:top left; }
canvas { display:block; }
#touch-ui { display:none; position:fixed; inset:0; pointer-events:none; z-index:20; }
.cbtn {
  position:absolute; pointer-events:all; touch-action:none;
  user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  border-radius:50%; border:2.5px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1); color:#fff; font-family:monospace; font-weight:bold;
  display:flex; align-items:center; justify-content:center;
  transition: background 0.05s; cursor:pointer;
}
.cbtn.pressed, .cbtn:active { background:rgba(255,255,255,0.32); border-color:rgba(255,255,255,0.7); }
#btn-drift { width:72px;height:72px;font-size:12px;background:rgba(255,136,0,0.18);border-color:rgba(255,136,0,0.55); }
#btn-drift.pressed { background:rgba(255,136,0,0.45); }
#btn-nitro { width:64px;height:64px;font-size:12px;background:rgba(30,140,255,0.18);border-color:rgba(30,140,255,0.55); }
#btn-nitro.pressed { background:rgba(30,140,255,0.4); }
#btn-menu  { width:52px;height:52px;font-size:11px;background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2); }
#joystick-base {
  position:absolute; pointer-events:all; touch-action:none;
  user-select:none; -webkit-user-select:none;
  border-radius:50%;
}
</style>
</head>
<body>
<div id="rotate-prompt" style="
  display:none;position:fixed;inset:0;z-index:999;
  background:#000;color:#fff;
  flex-direction:column;align-items:center;justify-content:center;
  font-family:monospace;font-size:18px;text-align:center;gap:16px;">
  <div style="font-size:56px;">📱↻</div>
  <div>Rotate your device<br>to landscape to play</div>
</div>
<div id="wrapper">
<canvas id="c"></canvas>
</div>
<div id="touch-ui">
  <canvas id="joystick-base" width="160" height="160"></canvas>
  <div class="cbtn" id="btn-drift">DRIFT</div>
  <div class="cbtn" id="btn-nitro">N⚡</div>
  <div class="cbtn" id="btn-menu">MENU</div>
</div>

<div id="nitro-loader" style="
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,0.82);
  flex-direction:column; align-items:center; justify-content:center;
  font-family:monospace; color:#fff; gap:14px; text-align:center;">
  <div style="font-size:36px;">⚡</div>
  <div style="font-size:18px; font-weight:bold;">Load nitro.mp3</div>
  <div style="font-size:12px; color:rgba(255,255,255,0.5);">Select your nitro.mp3 to enable the boost sound</div>
  <label style="cursor:pointer; padding:12px 28px; border-radius:8px;
    background:#1188ff; color:#fff; font-family:monospace;
    font-size:14px; font-weight:bold; border:2px solid #44aaff;">
    📂 Select nitro.mp3
    <input type="file" accept=".mp3,audio/*" id="nitro-file-input" style="display:none">
  </label>
  <div style="font-size:11px; color:rgba(255,255,255,0.3);">Once per session · file stays local</div>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

const TRACK_W = 70;
const TOTAL_LAPS = 3;

// -- Track definitions ------------------------------------------
const TRACK_DEFS = [
  {
    name:'OVAL',
    desc:'Wide sweeping oval · great for drifting',
    color:'#44aaff',
    raw:[
      {x:400,y:55},{x:520,y:58},{x:630,y:75},{x:710,y:110},
      {x:755,y:165},{x:770,y:240},{x:760,y:320},{x:720,y:395},
      {x:650,y:455},{x:540,y:495},{x:400,y:508},{x:260,y:495},
      {x:150,y:455},{x:80,y:395},{x:40,y:320},{x:30,y:240},
      {x:45,y:165},{x:90,y:110},{x:170,y:75},{x:280,y:58}
    ]
  },
  {
    name:'CIRCUIT',
    desc:'Fast sweeping bends mixed with tight chicanes',
    color:'#ff8800',
    raw:[
      {x:100,y:100},{x:380,y:75},{x:560,y:75},{x:680,y:120},
      {x:730,y:210},{x:700,y:290},{x:610,y:330},{x:500,y:325},
      {x:430,y:370},{x:460,y:430},{x:600,y:455},{x:700,y:490},
      {x:720,y:540},{x:100,y:540},{x:55,y:490},{x:55,y:160}
    ]
  },
  {
    name:'STREET',
    desc:'Tight city layout · no room for mistakes',
    color:'#ff4466',
    raw:[
      {x:150,y:80},{x:450,y:80},{x:540,y:95},{x:650,y:80},
      {x:730,y:130},{x:730,y:210},{x:670,y:255},{x:540,y:260},
      {x:490,y:305},{x:540,y:350},{x:680,y:360},{x:740,y:415},
      {x:720,y:490},{x:630,y:530},{x:150,y:530},{x:70,y:475},
      {x:70,y:185},{x:110,y:120}
    ]
  },
  {
    name:'HAIRPIN',
    desc:'Blast down straights · survive the hairpins',
    color:'#aa44ff',
    raw:[
      {x:110,y:95},{x:690,y:95},{x:740,y:155},{x:740,y:235},
      {x:670,y:278},{x:460,y:278},{x:400,y:310},{x:400,y:355},
      {x:460,y:388},{x:690,y:388},{x:740,y:440},{x:740,y:510},
      {x:670,y:555},{x:110,y:555},{x:60,y:505},{x:60,y:145}
    ]
  },
];

let selectedTrack = 0;

function buildTrack(raw) {
  const cen = densify(laplace(raw, 8), 8);
  const SN = cen.length;
  const getNormal = i => {
    const a=cen[(i-1+SN)%SN], b=cen[(i+1)%SN];
    const dx=b.x-a.x, dy=b.y-a.y, l=Math.hypot(dx,dy)||1;
    return {nx:-dy/l, ny:dx/l};
  };
  const outer    = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x+n.nx*TRACK_W,     y:p.y+n.ny*TRACK_W};});
  const inner    = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x-n.nx*TRACK_W,     y:p.y-n.ny*TRACK_W};});
  const outerIn  = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x+n.nx*(TRACK_W-6), y:p.y+n.ny*(TRACK_W-6)};});
  const innerOut = cen.map((p,i)=>{const n=getNormal(i);return{x:p.x-n.nx*(TRACK_W-6), y:p.y-n.ny*(TRACK_W-6)};});
  const curvMap = (() => {
    const raw2 = cen.map((_,i) => {
      const p=cen[(i-5+SN)%SN], n=cen[(i+5)%SN];
      let d=Math.atan2(n.y-cen[i].y,n.x-cen[i].x)-Math.atan2(cen[i].y-p.y,cen[i].x-p.x);
      while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI;
      return Math.abs(d);
    });
    return raw2.map((_,i)=>{let s=0;for(let k=-10;k<=10;k++)s+=raw2[(i+k+SN)%SN];return s/21;});
  })();
  return {cen, SN, outer, inner, outerIn, innerOut, curvMap, getNormal};
}

let RAW = TRACK_DEFS[0].raw;

function laplace(pts, n) {
  let p = pts.map(o => ({...o}));
  for (let k = 0; k < n; k++)
    p = p.map((_,i) => ({
      x: p[(i-1+p.length)%p.length].x*.25 + p[i].x*.5 + p[(i+1)%p.length].x*.25,
      y: p[(i-1+p.length)%p.length].y*.25 + p[i].y*.5 + p[(i+1)%p.length].y*.25,
    }));
  return p;
}

function densify(pts, steps) {
  const out = [];
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i+1)%pts.length];
    for (let j = 0; j < steps; j++) {
      const t = j/steps;
      out.push({x: a.x+(b.x-a.x)*t, y: a.y+(b.y-a.y)*t});
    }
  }
  return out;
}

let cen, SN, outer, inner, outerIn, innerOut, curvMap;
function getNormal(i){
  const a=cen[(i-1+SN)%SN],b=cen[(i+1)%SN];
  const dx=b.x-a.x,dy=b.y-a.y,l=Math.hypot(dx,dy)||1;
  return{nx:-dy/l,ny:dx/l};
}

function applyTrack(trackIdx){
  selectedTrack=trackIdx;
  const t=buildTrack(TRACK_DEFS[trackIdx].raw);
  cen=t.cen; SN=t.SN; outer=t.outer; inner=t.inner;
  outerIn=t.outerIn; innerOut=t.innerOut; curvMap=t.curvMap;
}
applyTrack(0);

function nearestPt(x, y) {
  let best=Infinity, bi=0;
  for (let i=0;i<SN;i++) {
    const a=cen[i],b=cen[(i+1)%SN];
    const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1;
    const t=Math.max(0,Math.min(1,((x-a.x)*dx+(y-a.y)*dy)/l2));
    const d=Math.hypot(x-a.x-t*dx,y-a.y-t*dy);
    if(d<best){best=d;bi=i;}
  }
  return {dist:best,seg:bi};
}

const oc = document.createElement('canvas');
oc.width=W; oc.height=H;
const ot = oc.getContext('2d');

function rebuildTrackCanvas(){
  ot.clearRect(0,0,W,H);
  ot.fillStyle='#0a1628'; ot.fillRect(0,0,W,H);
  for(let i=0;i<200;i++){
    ot.globalAlpha=0.15+Math.random()*0.7; ot.fillStyle='#fff';
    ot.fillRect(Math.random()*W,Math.random()*H,1+Math.random()*.8,1+Math.random()*.8);
  }
  ot.globalAlpha=1;

  ot.fillStyle='#1a3d28';
  ot.beginPath(); ot.moveTo(outer[0].x,outer[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(outer[i].x,outer[i].y);
  ot.closePath(); ot.fill();

  ot.fillStyle='#0d2418';
  ot.beginPath(); ot.moveTo(inner[0].x,inner[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(inner[i].x,inner[i].y);
  ot.closePath(); ot.fill();

  ot.fillStyle='#252525';
  const roadPath = new Path2D();
  roadPath.moveTo(outer[0].x,outer[0].y);
  for(let i=1;i<SN;i++) roadPath.lineTo(outer[i].x,outer[i].y);
  roadPath.closePath();
  roadPath.moveTo(inner[0].x,inner[0].y);
  for(let i=1;i<SN;i++) roadPath.lineTo(inner[i].x,inner[i].y);
  roadPath.closePath();
  ot.fill(roadPath,'evenodd');

  [[outer,'outer'],[inner,'inner']].forEach(([wall])=>{
    ot.strokeStyle='rgba(0,0,0,0.6)'; ot.lineWidth=13;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    ot.strokeStyle='#3a3a3a'; ot.lineWidth=9;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    ot.strokeStyle='#555'; ot.lineWidth=2;
    ot.beginPath(); ot.moveTo(wall[0].x,wall[0].y);
    for(let i=1;i<SN;i++) ot.lineTo(wall[i].x,wall[i].y);
    ot.closePath(); ot.stroke();

    const segLen = 18;
    for(let i=0;i<SN;i++){
      const col=Math.floor(i/segLen)%2===0?'#dd1111':'#f0f0f0';
      ot.strokeStyle=col; ot.lineWidth=3;
      ot.lineCap='butt';
      ot.beginPath(); ot.moveTo(wall[i].x,wall[i].y);
      ot.lineTo(wall[(i+1)%SN].x,wall[(i+1)%SN].y); ot.stroke();
    }
  });

  ot.fillStyle='#252525';
  const roadPath2 = new Path2D();
  roadPath2.moveTo(outerIn[0].x,outerIn[0].y);
  for(let i=1;i<SN;i++) roadPath2.lineTo(outerIn[i].x,outerIn[i].y);
  roadPath2.closePath();
  roadPath2.moveTo(innerOut[0].x,innerOut[0].y);
  for(let i=1;i<SN;i++) roadPath2.lineTo(innerOut[i].x,innerOut[i].y);
  roadPath2.closePath();
  ot.fill(roadPath2,'evenodd');

  ot.setLineDash([14,14]); ot.strokeStyle='rgba(255,255,255,0.18)'; ot.lineWidth=2;
  ot.beginPath(); ot.moveTo(cen[0].x,cen[0].y);
  for(let i=1;i<SN;i++) ot.lineTo(cen[i].x,cen[i].y);
  ot.closePath(); ot.stroke(); ot.setLineDash([]);

  {
    const n=getNormal(0);
    const p0={x:cen[0].x+n.nx*TRACK_W,y:cen[0].y+n.ny*TRACK_W};
    const p1={x:cen[0].x-n.nx*TRACK_W,y:cen[0].y-n.ny*TRACK_W};
    const ang=Math.atan2(cen[1].y-cen[0].y,cen[1].x-cen[0].x);
    const fdx=Math.cos(ang)*14, fdy=Math.sin(ang)*14;
    for(let j=0;j<8;j++){
      const t=j/8,t2=(j+1)/8;
      const lx=p0.x+(p1.x-p0.x)*t, ly=p0.y+(p1.y-p0.y)*t;
      const rx=p0.x+(p1.x-p0.x)*t2, ry=p0.y+(p1.y-p0.y)*t2;
      ot.fillStyle=j%2===0?'#fff':'#111';
      ot.beginPath(); ot.moveTo(lx,ly); ot.lineTo(rx,ry);
      ot.lineTo(rx+fdx,ry+fdy); ot.lineTo(lx+fdx,ly+fdy);
      ot.closePath(); ot.fill();
    }
  }

  {
    const peak=Math.max(...curvMap)*0.6;
    for(let i=0;i<SN;i++){
      if(curvMap[i]>peak&&i%5===0){
        const p=inner[i];
        ot.fillStyle='#ff6600'; ot.beginPath(); ot.arc(p.x,p.y,5,0,Math.PI*2); ot.fill();
        ot.fillStyle='#fff';    ot.beginPath(); ot.arc(p.x,p.y,2,0,Math.PI*2); ot.fill();
      }
    }
  }

  for(let i=0;i<SN;i+=3){
    const n=getNormal(i);
    ot.fillStyle=`hsl(${130+Math.sin(i)*20},40%,${12+Math.random()*6}%)`;
    ot.beginPath(); ot.arc(outer[i].x+n.nx*18,outer[i].y+n.ny*18,4+Math.random()*3,0,Math.PI*2); ot.fill();
  }
}
rebuildTrackCanvas();

// -- Audio ---------------------------------------------------
let audioReady=false, actx;
let driftOsc, driftGain;
let engineOsc, engineGain;
let nitroNoiseGain, nitroBandpass, nitroRumbleOsc, nitroRumbleGain;
let nitroBuffer=null, nitroSource=null, nitroPlaying=false, nitroAudioEl=null;
let lastCountdownBeat=-1;

function initAudio(){
  if(audioReady) return; audioReady=true;
  actx=new(window.AudioContext||window.webkitAudioContext)();

  // Drift Sound
  driftOsc=actx.createOscillator(); driftOsc.type='sawtooth'; driftOsc.frequency.value=280;
  const driftFilter=actx.createBiquadFilter(); driftFilter.type='bandpass'; driftFilter.frequency.value=800; driftFilter.Q.value=0.5;
  driftGain=actx.createGain(); driftGain.gain.value=0;
  driftOsc.connect(driftFilter); driftFilter.connect(driftGain); driftGain.connect(actx.destination);
  driftOsc.start();

  // Engine Sound
  engineOsc=actx.createOscillator(); engineOsc.type='triangle'; engineOsc.frequency.value=60;
  engineGain=actx.createGain(); engineGain.gain.value=0;
  const engineFilter=actx.createBiquadFilter(); engineFilter.type='lowpass'; engineFilter.frequency.value=1000;
  engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(actx.destination);
  engineOsc.start();

  // ── NITRO: file picker (works on file:// in all browsers) ──
  nitroNoiseGain = actx.createGain();
  nitroNoiseGain.gain.value = 0;
  nitroNoiseGain.connect(actx.destination);

  nitroBandpass  = actx.createBiquadFilter();
  nitroRumbleGain = actx.createGain();
  nitroRumbleGain.gain.value = 0;
  nitroRumbleGain.connect(actx.destination);
  nitroRumbleOsc = actx.createOscillator();
  nitroRumbleOsc.start();

  // Try fetch first (works if served via http://)
  // Falls back to showing the file-picker overlay
  fetch('nitro.mp3')
    .then(r => { if(!r.ok) throw new Error('not found'); return r.arrayBuffer(); })
    .then(ab => actx.decodeAudioData(ab))
    .then(buf => { nitroBuffer = buf; document.getElementById('nitro-loader').style.display='none'; })
    .catch(() => { document.getElementById('nitro-loader').style.display='flex'; });
}

function playCollisionSound(intensity) {
  if(!audioReady) return;
  const osc = actx.createOscillator(), g = actx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100 + Math.random()*50, actx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.1);
  g.gain.setValueAtTime(intensity * 0.15, actx.currentTime);
  g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.15);
  osc.connect(g); g.connect(actx.destination);
  osc.start(); osc.stop(actx.currentTime + 0.15);
}

function triggerExplosion(c){
  if(c.exploded) return;
  c.exploded=true; c.explodeTimer=2.2;
  c.speed=0; c.vx=0; c.vy=0;
  for(let k=0;k<80;k++){
    const angle=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*6;
    sparks.push({
      x:c.x,y:c.y,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
      life:1+Math.random()*0.5, hue:10+Math.random()*50, big:k<20
    });
  }
  for(let k=0;k<30;k++){
    smoke.push({
      x:c.x+(Math.random()-.5)*20, y:c.y+(Math.random()-.5)*20,
      vx:(Math.random()-.5)*2, vy:(Math.random()-.5)*2-1,
      r:8+Math.random()*14, life:1.2, nitro:false
    });
  }
  if(audioReady&&actx){
    stopAllSound();
    const boom=actx.createOscillator(), bg=actx.createGain();
    boom.type='sine'; boom.frequency.setValueAtTime(80,actx.currentTime);
    boom.frequency.exponentialRampToValueAtTime(20,actx.currentTime+0.6);
    bg.gain.setValueAtTime(0.6,actx.currentTime);
    bg.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.7);
    boom.connect(bg); bg.connect(actx.destination);
    boom.start(); boom.stop(actx.currentTime+0.7);
    const bufLen=actx.sampleRate*0.4;
    const nBuf=actx.createBuffer(1,bufLen,actx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1)*(1-i/bufLen);
    const ns=actx.createBufferSource();
    ns.buffer=nBuf;
    const ng=actx.createGain(); ng.gain.value=0.4;
    ns.connect(ng); ng.connect(actx.destination);
    ns.start();
  }
}

function stopAllSound(){
  if(!audioReady||!actx) return;
  try{
    const t = actx.currentTime;
    driftGain.gain.cancelScheduledValues(t);
    driftGain.gain.setValueAtTime(driftGain.gain.value, t);
    driftGain.gain.linearRampToValueAtTime(0, t + 0.08);

    nitroNoiseGain.gain.cancelScheduledValues(t);
    nitroNoiseGain.gain.setValueAtTime(nitroNoiseGain.gain.value, t);
    nitroNoiseGain.gain.linearRampToValueAtTime(0, t + 0.08);

    nitroRumbleGain.gain.cancelScheduledValues(t);
    nitroRumbleGain.gain.setValueAtTime(nitroRumbleGain.gain.value, t);
    nitroRumbleGain.gain.linearRampToValueAtTime(0, t + 0.08);

    if(nitroPlaying){
      nitroPlaying=false;
      if(nitroSource){ const s=nitroSource; nitroSource=null; setTimeout(()=>{try{s.stop();}catch(e){}},100); }
    }

    engineGain.gain.cancelScheduledValues(t);
    engineGain.gain.setValueAtTime(engineGain.gain.value, t);
    engineGain.gain.linearRampToValueAtTime(0, t + 0.15);
  }catch(e){}
}

function updateAudio(speed, maxSpeed, drifting, nitroActive){
  if(!audioReady || !actx) return;
  const ratio = Math.abs(speed) / maxSpeed;

  engineOsc.frequency.setTargetAtTime(60 + (ratio * 290), actx.currentTime, 0.05);
  engineGain.gain.setTargetAtTime(state === 'racing' ? 0.1 + (ratio * 0.15) : 0.05, actx.currentTime, 0.1);

  driftGain.gain.setTargetAtTime(drifting && ratio > 0.2 ? 0.06 : 0, actx.currentTime, 0.05);

  // ── NITRO: looping BufferSource from decoded MP3 ──
  if(nitroActive){
    if(!nitroPlaying && nitroBuffer){
      nitroPlaying = true;
      nitroSource = actx.createBufferSource();
      nitroSource.buffer = nitroBuffer;
      nitroSource.loop = true;
      nitroSource.connect(nitroNoiseGain);
      nitroSource.start();
    }
    nitroNoiseGain.gain.setTargetAtTime(0.9, actx.currentTime, 0.06);
  } else {
    if(nitroPlaying){
      nitroPlaying = false;
      const fadeTime = car.nitro <= 0 ? 0.05 : 0.45;
      nitroNoiseGain.gain.cancelScheduledValues(actx.currentTime);
      nitroNoiseGain.gain.setValueAtTime(nitroNoiseGain.gain.value, actx.currentTime);
      nitroNoiseGain.gain.linearRampToValueAtTime(0, actx.currentTime + fadeTime);
      if(nitroSource){
        const s = nitroSource; nitroSource = null;
        setTimeout(()=>{ try{ s.stop(); }catch(e){} }, fadeTime*1000+50);
      }
    }
  }
}

function beep(freq,duration,vol=0.35,type='sine'){
  if(!audioReady||!actx) return;
  const osc=actx.createOscillator(), g=actx.createGain();
  osc.type=type; osc.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+duration);
  osc.connect(g); g.connect(actx.destination);
  osc.start(); osc.stop(actx.currentTime+duration);
}

function updateCountdownAudio(ct){
  if(!audioReady) return;
  const beat=ct>3?3:ct>2?2:ct>1?1:ct>0?0:-1;
  if(beat>=0&&beat!==lastCountdownBeat){
    lastCountdownBeat=beat;
    if(beat===0) beep(880,0.45,0.5);
    else         beep(440,0.18,0.35);
  }
}

function makeCar(x,y,color,isAI,name,skill,lookahead,offset){

function gridPos(slot) {
  const rowSpacing = 38;
  const sideOffset = 22;
  const side = slot % 2 === 0 ? -1 : 1;
  const row  = slot;
  return {
    x: cen[0].x - fwdV.x * row * rowSpacing + (-fwdV.y) * side * sideOffset,
    y: cen[0].y - fwdV.y * row * rowSpacing +   fwdV.x  * side * sideOffset,
  };
}

function shuffleGrid() {
  const ranks = [0,1,2,3];
  for(let i=ranks.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [ranks[i],ranks[j]]=[ranks[j],ranks[i]];
  }
  return ranks;
}

if(!hs.bestRaces.normal) hs.bestRaces.normal=[];

const keys={};

const brakeKey=()=>keys['KeyS']||keys['ArrowDown'];
const leftKey=()=>keys['KeyA']||keys['ArrowLeft'];
const rightKey=()=>keys['KeyD']||keys['ArrowRight'];

function resetCar(c,x,y){
  c.x=x;c.y=y;c.angle=startAngle;c.speed=0;c.vx=0;c.vy=0;
  c.drifting=false;c.driftAngle=0;c.laps=0;c.leftStart=false;
  c.finished=false;c.finishTime=0;c.nitro=100;
  c.wheelRot=0;c.steerAngle=0;c.steerInput=0;c.throttleSmooth=0;
  c.hp=100;c.dmgFlash=0;c.dents=[];c.lastCollSpeed=0;c.exploded=false;c.explodeTimer=0;
}

function applyDifficulty(){
  const presets = {
    beginner: {skillMult:0.82, speedMult:0.96, lookMult:1.0},
    normal:   {skillMult:1.05, speedMult:1.15, lookMult:1.4},
    pro:      {skillMult:1.25, speedMult:1.38, lookMult:1.8},
  };
  const p = presets[aiDifficulty] || presets.normal;
  AI_DEFS.forEach((d,i)=>{
    aiCars[i].skill    = Math.min(1.0, d.skill * p.skillMult);
    aiCars[i].maxSpeed = car.maxSpeed * p.speedMult;
    aiCars[i].lookahead= Math.round(d.look * p.lookMult);
  });
}

function beginCountdown(){
  startAngle=Math.atan2(cen[1].y-cen[0].y,cen[1].x-cen[0].x);
  fwdV={x:Math.cos(startAngle),y:Math.sin(startAngle)};
  rightV={x:-Math.sin(startAngle),y:Math.cos(startAngle)};
  const slots = gameMode==='race' ? shuffleGrid() : [0,1,2,3];
  playerGridPos = slots[0] + 1;
  const pg = gridPos(slots[0]);
  resetCar(car, pg.x, pg.y);
  if(gameMode==='race'){
    AI_DEFS.forEach((d,i)=>{
      const gp = gridPos(slots[i+1]);
      resetCar(aiCars[i], gp.x, gp.y);
    });
  } else {
    AI_DEFS.forEach((d,i) => resetCar(aiCars[i], -9999, -9999));
  }
  if(gameMode==='race') applyDifficulty();
  skids.length=0;smoke.length=0;sparks.length=0;
  results=[];lapHistory=[];flashMsg='';flashAlpha=0;bestLap=Infinity;
  countdownT=4;lastCountdownBeat=-1;lapStart=0;lapTime=0;
  raceAgainBtn=null;menuBtn=null;doAgainBtn=null;
  lapFlashAlpha=0;screenShake=0;newBestLap=false;newBestSpeedrun=false;newBestRace=false;sessionStart=0;
  state='countdown';
}

function applyPhysics(c,dt,throttle,steering,drift,nitro){
  const hpMult=0.45+0.55*(c.hp/100);
  const topSpd=(nitro?c.maxSpeed*1.42:c.maxSpeed)*hpMult;
  const topRev=c.maxSpeed*0.38;

  if(throttle>0){
    if(c.speed>-0.15){
      c.speed=Math.min(c.speed+c.accel*dt,topSpd);
    } else {
      c.speed=Math.min(c.speed+c.brake*0.6*dt,0);
    }
  } else if(throttle<0){
    if(c.speed>0.15){
      c.speed=Math.max(c.speed-c.brake*dt,0);
    } else if(c.speed>-0.05){
      c.speed=Math.max(c.speed-c.accel*0.65*dt,-topRev);
    } else {
      c.speed=Math.max(c.speed-c.accel*0.65*dt,-topRev);
    }
  } else {
    if(Math.abs(c.speed)>0.01){
      c.speed-=Math.sign(c.speed)*Math.min(Math.abs(c.speed),c.decel*dt);
    } else {
      c.speed=0;
    }
  }

  c.drifting=drift&&Math.abs(c.speed)>1.0;
  if(c.drifting&&!c.isAI) c.speed+=(c.speed>0?-0.055:0.055)*dt;

  if(Math.abs(c.speed)>0.05){
    const tr=c.drifting?c.turnRate*1.3:c.turnRate;
    const speedFactor=Math.min(Math.abs(c.speed)/2,1);
    c.angle+=steering*tr*Math.sign(c.speed)*speedFactor*dt;
  }

  const grip=c.drifting?0.09:0.18;
  const tvx=Math.cos(c.angle)*c.speed;
  const tvy=Math.sin(c.angle)*c.speed;
  c.vx+=(tvx-c.vx)*grip*dt;
  c.vy+=(tvy-c.vy)*grip*dt;

  const slip=Math.atan2(c.vy,c.vx)-c.angle;
  c.driftAngle+=((c.drifting?-Math.sin(slip)*0.45:0)-c.driftAngle)*0.15*dt;

  c.x+=c.vx*dt; c.y+=c.vy*dt;

  const {dist,seg}=nearestPt(c.x,c.y);
  if(dist>TRACK_W-7){
    const cp=cen[seg], bx=cp.x-c.x, by=cp.y-c.y, bl=Math.hypot(bx,by)||1;
    c.x+=bx/bl*2; c.y+=by/bl*2;
    const impactSpd=Math.abs(c.speed);
    c.speed*=0.62; c.vx*=0.62; c.vy*=0.62;
    if(impactSpd>1.8&&impactSpd!==c.lastCollSpeed){
      c.hp=Math.max(0,c.hp-Math.min(18,impactSpd*2.2));
      c.dmgFlash=1; c.lastCollSpeed=impactSpd;
      if(!c.isAI) screenShake=Math.min(8,impactSpd*1.2);
      if(c.dents.length<20){
        const ca=Math.cos(-(c.angle+Math.PI/2)), sa=Math.sin(-(c.angle+Math.PI/2));
        const dx2=bx/bl*(-8), dy2=by/bl*(-8);
        c.dents.push({lx:Math.max(-6,Math.min(6,dx2*ca-dy2*sa)),ly:Math.max(-13,Math.min(13,dx2*sa+dy2*ca)),a:Math.random()*Math.PI});
      }
    } else if(impactSpd<=1.8) c.lastCollSpeed=0;
    if(Math.abs(c.speed)>1.5)
      for(let k=0;k<12;k++) sparks.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*5+bx/bl,vy:(Math.random()-0.5)*5+by/bl,life:1,hue:10+Math.random()*50});
  }
}

function checkLap(c,now){
  if(c.finished) return;
  const {seg}=nearestPt(c.x,c.y);
  if(!c.leftStart&&Math.hypot(c.x-cen[0].x,c.y-cen[0].y)>TRACK_W*1.5) c.leftStart=true;
  if(c.leftStart&&seg<=4&&Math.hypot(c.x-cen[0].x,c.y-cen[0].y)<TRACK_W+8){
    if(c.vx*fwdV.x+c.vy*fwdV.y<=0) return;
    const t=now-lapStart;
    if(!c.isAI){
      const isBest=t<bestLap;
      if(isBest){
        bestLap=t;flashMsg='🏆 BEST LAP  '+fmt(t);flashAlpha=1;
        const worstSaved = hs.bestLaps.length<3 ? Infinity : hs.bestLaps[hs.bestLaps.length-1];
        if(t<worstSaved||hs.bestLaps.length<3){insertBestLap(t);newBestLap=true;}
      }
      else{flashMsg='🏁 LAP  '+fmt(t);flashAlpha=1;}
      lapFlashAlpha=1;
      lapFlashColor=isBest?'#ffd700':'#44ff44';
      if(gameMode==='practice') lapHistory.push({time:t,best:isBest});
      lapStart=now;
    }
    c.laps++; c.leftStart=false;
    if(gameMode==='race'&&c.laps>=TOTAL_LAPS&&!c.finished){
      c.finished=true; c.finishTime=now-raceStart;
      results.push({name:c.isAI?c.name:'YOU',time:c.finishTime,color:c.color,isPlayer:!c.isAI});
      if(!c.isAI){
        const diffKey = aiDifficulty||'normal';
        const diffRecords = hs.bestRaces[diffKey]||[];
        const worstRace = diffRecords.length<3 ? Infinity : diffRecords[diffRecords.length-1];
        if(c.finishTime<worstRace||diffRecords.length<3){insertBestRace(c.finishTime);newBestRace=true;}
        state='finished';stopAllSound();
      }
    }
    if(gameMode==='practice'&&!c.isAI&&c.laps>=TOTAL_LAPS){
      const speedrun = now - sessionStart;
      if(!hs.bestSpeedrun||speedrun<hs.bestSpeedrun){
        hs.bestSpeedrun=speedrun;saveHS(hs);newBestSpeedrun=true;
      }
      stopAllSound();state='finished';
    }
  }
}

function getStandings(){
  return allCars.map(c=>{
    const {seg}=nearestPt(c.x,c.y);
    return {c,prog:c.finished?SN*TOTAL_LAPS*2-c.finishTime:c.laps*SN+seg};
  }).sort((a,b)=>b.prog-a.prog);
}

function drawSpeedLines(c) {
  const spd = Math.hypot(c.vx, c.vy);
  const ratio = spd / c.maxSpeed;
  if(ratio < 0.68) return;
  const intensity = (ratio - 0.68) / 0.32;
  ctx.save();
  ctx.globalAlpha = intensity * 0.25;
  const bx = -Math.cos(c.angle), by = -Math.sin(c.angle);
  for(let i = 0; i < 12; i++) {
    const spread = (Math.random()-0.5) * 30;
    const px = c.x + spread*Math.sin(c.angle);
    const py = c.y - spread*Math.cos(c.angle);
    const len = 20 + Math.random()*35;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 0.5 + Math.random() * 0.8;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + bx*len, py + by*len);
    ctx.stroke();
  }
  ctx.restore();
}

let lastT=0;
function update(now){
  const dt=Math.min(now-lastT,50)/16;
  lastT=now;

  if(state==='countdown'){
    countdownT-=dt/60;
    updateCountdownAudio(countdownT);
    if(countdownT<=1&&lapStart===0){lapStart=now;raceStart=now;sessionStart=now;}
    if(countdownT<=0) state='racing';
    if(countdownT>1) return;
  }
  if(state!=='racing'&&state!=='countdown') return;

  lapTime=now-lapStart;
  if(flashAlpha>0) flashAlpha=Math.max(0,flashAlpha-0.012);
  if(lapFlashAlpha>0) lapFlashAlpha=Math.max(0,lapFlashAlpha-0.03);
  if(screenShake>0) screenShake=Math.max(0,screenShake-0.4*dt);
  allCars.forEach(c=>{if(c.dmgFlash>0) c.dmgFlash=Math.max(0,c.dmgFlash-0.04*dt);});

  const usingNitro=nitroKey()&&car.nitro>0&&car.hp>0&&!car.exploded;
  if(usingNitro){
    car.nitro=Math.max(0,car.nitro-dt*0.4);
  }

  if(car.hp<=0&&!car.exploded) triggerExplosion(car);
  if(car.exploded){
    car.explodeTimer-=dt/60;
    if(car.explodeTimer>0&&Math.random()<0.4)
      smoke.push({x:car.x+(Math.random()-.5)*16,y:car.y+(Math.random()-.5)*16,
        vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.2-0.8,
        r:6+Math.random()*10,life:1,nitro:false});
    if(car.explodeTimer<=0){
      if(gameMode==='practice'){
        stopAllSound();state='finished';
      } else {
        if(!results.find(r=>r.isPlayer))
          results.push({name:'YOU',time:0,color:car.color,isPlayer:true,dnf:true});
        stopAllSound();state='finished';
      }
    }
  }

  const wrecked=car.hp<=0;
  const _keyTh = accelKey()?1:brakeKey()?-1:0;
  const _joyTh = Math.abs(joystickY)>0.15 ? -joystickY : 0;
  const th = wrecked ? 0 : (_keyTh !== 0 ? _keyTh : _joyTh);
  const stClamped=wrecked?0:Math.max(-1,Math.min(1,(leftKey()?-1:0)+(rightKey()?1:0)+joystickX));

  applyPhysics(car,dt,th,stClamped,wrecked?false:driftKey(),wrecked?false:usingNitro);
  if(wrecked) car.speed*=Math.pow(0.92,dt);
  car.wheelRot+=car.speed*dt*0.28;
  car.steerInput+=(stClamped-car.steerInput)*0.18*dt;
  car.steerAngle+=(car.steerInput*0.61-car.steerAngle)*0.25*dt;

  const slip=Math.abs(Math.atan2(car.vy,car.vx)-car.angle);
  if(car.speed>1.5&&(car.drifting||slip>0.15)){
    skids.push({x:car.x-Math.cos(car.angle)*10,y:car.y-Math.sin(car.angle)*10,drift:car.drifting});
    if(skids.length>600) skids.shift();
  }
  if(car.drifting&&car.speed>1)
    for(let i=0;i<3;i++) smoke.push({
      x:car.x-Math.cos(car.angle)*12+(Math.random()-.5)*8,
      y:car.y-Math.sin(car.angle)*12+(Math.random()-.5)*8,
      vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:5+Math.random()*6,life:1,nitro:false
    });
  if(usingNitro && car.nitro>0)
    for(let i=0;i<3;i++) smoke.push({
      x:car.x-Math.cos(car.angle)*14+(Math.random()-.5)*6,
      y:car.y-Math.sin(car.angle)*14+(Math.random()-.5)*6,
      vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:3+Math.random()*6,life:0.9,nitro:true
    });

  for(let i=smoke.length-1;i>=0;i--){
    const s=smoke[i];s.x+=s.vx;s.y+=s.vy;s.r+=0.45;s.life-=0.038;
    if(s.life<=0) smoke.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.life-=0.055;
    if(s.life<=0) sparks.splice(i,1);
  }

  if(state==='racing') checkLap(car,now);

  if(gameMode==='race'){
    for(const ai of aiCars){
      if(ai.finished) continue;
      const {seg}=nearestPt(ai.x,ai.y);
      const nearIdx=(seg+Math.round(ai.lookahead*0.6))%SN;
      const farIdx=(seg+ai.lookahead)%SN;
      const nN=getNormal(nearIdx), nF=getNormal(farIdx);
      let dN=Math.atan2(cen[nearIdx].y+nN.ny*ai.trackOffset-ai.y,cen[nearIdx].x+nN.nx*ai.trackOffset-ai.x)-ai.angle;
      let dF=Math.atan2(cen[farIdx].y+nF.ny*ai.trackOffset-ai.y, cen[farIdx].x+nF.nx*ai.trackOffset-ai.x)-ai.angle;
      while(dN>Math.PI)dN-=2*Math.PI;while(dN<-Math.PI)dN+=2*Math.PI;
      while(dF>Math.PI)dF-=2*Math.PI;while(dF<-Math.PI)dF+=2*Math.PI;
      const blend=Math.min(1,ai.speed/ai.maxSpeed);
      ai.noisePhase+=dt*0.012*(1-ai.skill);
      const rawSt=Math.max(-1,Math.min(1,(dN*(1-blend*0.5)+dF*(blend*0.5))*4.2+Math.sin(ai.noisePhase)*0.09*(1-ai.skill)));
      ai.steerInput+=(rawSt-ai.steerInput)*Math.min(1,0.12*dt);
      const lapBonus = Math.min(0.12, ai.laps * 0.05);
      const effectiveSkill = Math.min(1.0, ai.skill + lapBonus);
      const lookC=curvMap[(seg+ai.lookahead*2)%SN];
      const tgtSpd=ai.maxSpeed*effectiveSkill*Math.max(0.42,1-lookC*7.0*(1/effectiveSkill));
      const spdErr=tgtSpd-ai.speed;
      ai.throttleSmooth+=(((spdErr>0.3?1:spdErr<-0.5?-0.4:spdErr*0.8))-ai.throttleSmooth)*Math.min(1,0.08*dt);

      const canDrift = aiDifficulty==='normal' || aiDifficulty==='pro';
      const inCorner = curvMap[(seg+4)%SN] > 0.07;
      const hasSteering = Math.abs(rawSt) > 0.25;
      const hasSpeed = ai.speed > ai.maxSpeed * 0.40;
      const aiDrifting = canDrift && inCorner && hasSteering && hasSpeed;

      const canNitro = aiDifficulty==='pro';
      const aiStraight = curvMap[(seg+ai.lookahead)%SN] < 0.10;
      const aiUsingNitro = canNitro && aiStraight && !aiDrifting && ai.nitro > 0 && ai.speed > ai.maxSpeed*0.5;
      if(canNitro) ai.nitro = aiUsingNitro ? Math.max(0, ai.nitro-dt*0.4) : ai.nitro;

      applyPhysics(ai,dt,ai.throttleSmooth,ai.steerInput,aiDrifting,aiUsingNitro);
      ai.wheelRot+=ai.speed*dt*0.28;
      ai.steerAngle+=(ai.steerInput*0.61-ai.steerAngle)*0.25*dt;
      if(state==='racing') checkLap(ai,now);
    }
    if(state==='racing'&&aiCars.every(a=>a.finished)){state='finished';stopAllSound();}
  }

  if(gameMode==='race'){
    const CAR_R=10;
    for(let i=0;i<allCars.length;i++) for(let j=i+1;j<allCars.length;j++){
      const a=allCars[i],b=allCars[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001;
      if(d>=CAR_R*2) continue;
      const ov=CAR_R*2-d,nx=dx/d,ny=dy/d;
      a.x-=nx*ov*0.5;a.y-=ny*ov*0.5;b.x+=nx*ov*0.5;b.y+=ny*ov*0.5;
      const rvn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(rvn>0) continue;
      const imp=-(1+0.45)*rvn*0.5;
      a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;
      a.speed=Math.cos(a.angle)*a.vx+Math.sin(a.angle)*a.vy;
      b.speed=Math.cos(b.angle)*b.vx+Math.sin(b.angle)*b.vy;
      const im=Math.abs(rvn);
      if(im>1.2){
        const dmg=Math.min(14,im*1.8);
        a.hp=Math.max(0,a.hp-dmg);b.hp=Math.max(0,b.hp-dmg);
        a.dmgFlash=1;b.dmgFlash=1;
        if(a===car||b===car) screenShake=Math.min(6,im*0.9);
        const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        try{ playCollisionSound(im); }catch(e){}
        for(let k=0;k<10;k++) sparks.push({x:mx,y:my,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:0.9,hue:10+Math.random()*50});
      }
    }
  }

  updateAudio(Math.hypot(car.vx,car.vy),car.maxSpeed,car.drifting, usingNitro);
  updateWheel();
}

function lightenColor(hex, amt){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((c>>16)&255)+Math.round(255*amt));
  const g=Math.min(255,((c>>8)&255)+Math.round(255*amt));
  const b=Math.min(255,(c&255)+Math.round(255*amt));
  return `rgb(${r},${g},${b})`;
}
function darkenColor(hex, amt){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,((c>>16)&255)-Math.round(255*amt));
  const g=Math.max(0,((c>>8)&255)-Math.round(255*amt));
  const b=Math.max(0,(c&255)-Math.round(255*amt));
  return `rgb(${r},${g},${b})`;
}

function drawCar(c){
  if(c.exploded){
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle+Math.PI/2);
    ctx.fillStyle='rgba(20,10,5,0.92)';
    ctx.beginPath();ctx.roundRect(-6,-12,13,24,3);ctx.fill();
    ctx.strokeStyle='rgba(255,80,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(-6,-12,13,24,3);ctx.stroke();
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.angle+Math.PI/2);
  ctx.rotate(c.driftAngle);
  const w=13,h=26;

  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.roundRect(-w/2+3,h/2-h+3,w,h,3);ctx.fill();

  ctx.fillStyle=c.color;
  ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();
  if(c.hp<100){ctx.fillStyle=`rgba(80,0,0,${(1-c.hp/100)*0.45})`;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();}
  if(c.dmgFlash>0){ctx.fillStyle=`rgba(255,0,0,${c.dmgFlash*0.55})`;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,3);ctx.fill();}

  if(c.dents.length>0){
    ctx.save();ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=0.8;
    c.dents.forEach(d=>{ctx.save();ctx.translate(d.lx,d.ly);ctx.rotate(d.a);ctx.beginPath();ctx.moveTo(-2,0);ctx.lineTo(2,0);ctx.stroke();ctx.restore();});
    ctx.restore();
  }

  ctx.fillStyle='rgba(140,210,255,0.88)';
  ctx.beginPath();ctx.roundRect(-w/2+2,-h/2+2,w-4,h*0.3,1);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(-w/2+2,-h/2+2+h*0.3,w-4,h*0.35);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-2,-h/2,4,h);

  [[-w/2-4,-h/2,4,8,true],[w/2,-h/2,4,8,true],[-w/2-4,h/2-9,4,7,false],[w/2,h/2-9,4,7,false]].forEach(([rx,ry,rw,rh,isFront])=>{
    ctx.save();
    ctx.translate(rx+rw/2,ry+rh/2);
    if(isFront) ctx.rotate(c.steerAngle);
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,rw,rh,1.5);ctx.fill();
    ctx.strokeStyle='rgba(80,80,80,0.8)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.roundRect(-rw/2,-rh/2,rw,rh,1.5);ctx.stroke();
    ctx.save();ctx.rotate(c.wheelRot);
    ctx.strokeStyle='rgba(130,130,130,0.5)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,-(rh/2-1));ctx.lineTo(0,rh/2-1);ctx.stroke();
    ctx.strokeStyle='rgba(130,130,130,0.3)';
    ctx.beginPath();ctx.moveTo(-(rw/2-0.5),0);ctx.lineTo(rw/2-0.5,0);ctx.stroke();
    ctx.fillStyle='rgba(160,160,160,0.45)';ctx.beginPath();ctx.arc(0,0,0.7,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.restore();
  });

  ctx.fillStyle='rgba(255,240,130,0.95)';
  ctx.fillRect(-w/2+1,-h/2,3,3);ctx.fillRect(w/2-4,-h/2,3,3);
  ctx.fillStyle='rgba(255,50,50,0.9)';
  ctx.fillRect(-w/2+1,h/2-4,3,3);ctx.fillRect(w/2-4,h/2-4,3,3);

  if(c.isAI){
    ctx.restore();ctx.save();ctx.translate(c.x,c.y);
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 8px monospace';
    ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(c.name,0,16);
  }
  ctx.restore();

  if(c.drifting&&c.speed>1){
    ctx.save();ctx.globalAlpha=0.18+Math.random()*0.08;
    ctx.strokeStyle=c.color;ctx.lineWidth=3;ctx.shadowColor=c.color;ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(c.x,c.y,19+Math.random()*5,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  if(!c.isAI&&nitroKey()&&car.nitro>0&&(state==='racing'||state==='countdown')){
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle+Math.PI/2);
    const g=ctx.createRadialGradient(0,h/2+4,0,0,h/2+4,12);
    g.addColorStop(0,'rgba(100,180,255,0.9)');g.addColorStop(0.5,'rgba(0,100,255,0.5)');g.addColorStop(1,'rgba(0,0,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,h/2+4,5,12+Math.random()*6,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  {
    const BW=24,BH=4,BY=-22,isP=c===car;
    if(isP||c.hp<100||c.dmgFlash>0){
      ctx.save();ctx.translate(c.x,c.y);
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.roundRect(-BW/2-1,BY-1,BW+2,BH+2,2);ctx.fill();
      ctx.fillStyle='rgba(80,0,0,0.8)';ctx.beginPath();ctx.roundRect(-BW/2,BY,BW,BH,1);ctx.fill();
      const frac=c.hp/100;
      ctx.fillStyle=c.hp>60?'#44ee44':c.hp>30?'#ffaa00':'#ff2222';
      if(frac>0){ctx.beginPath();ctx.roundRect(-BW/2,BY,BW*frac,BH,1);ctx.fill();}
      if(c.dmgFlash>0){ctx.fillStyle=`rgba(255,60,60,${c.dmgFlash*0.7})`;ctx.beginPath();ctx.roundRect(-BW/2,BY,BW,BH,1);ctx.fill();}
      if(isP){ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('YOU',0,BY-1);}
      ctx.restore();
    }
  }
}

function render(now){
  const shakeX = screenShake>0 ? (Math.random()-0.5)*screenShake : 0;
  const shakeY = screenShake>0 ? (Math.random()-0.5)*screenShake : 0;

  ctx.save();
  if(screenShake>0) ctx.translate(shakeX, shakeY);

  ctx.drawImage(oc,0,0);

  ctx.save();
  skids.forEach((s,i)=>{ctx.globalAlpha=0.12+0.28*(i/Math.max(1,skids.length-1));ctx.fillStyle=s.drift?'#ff8800':'#0a0a0a';ctx.beginPath();ctx.arc(s.x,s.y,s.drift?3:2,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  ctx.save();
  smoke.forEach(s=>{ctx.globalAlpha=s.life*0.5;ctx.fillStyle=s.nitro?'rgba(60,150,255,0.8)':'rgba(180,180,180,0.8)';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  ctx.save();
  sparks.forEach(s=>{ctx.globalAlpha=s.life;ctx.fillStyle=`hsl(${s.hue||40},100%,70%)`;ctx.beginPath();ctx.arc(s.x,s.y,s.big?5:2.5,0,Math.PI*2);ctx.fill();});
  ctx.restore();

  if(gameMode==='race') [...aiCars,car].forEach(c=>{drawCar(c);drawSpeedLines(c);});
  else {drawCar(car);drawSpeedLines(car);}

  if(state==='racing'||state==='countdown') drawHUD();
  drawSteeringWheel();

  if(lapFlashAlpha>0){
    ctx.save();
    ctx.globalAlpha=lapFlashAlpha*0.18;
    ctx.fillStyle=lapFlashColor;
    ctx.fillRect(0,0,W,H);
    const eg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(1,lapFlashColor);
    ctx.globalAlpha=lapFlashAlpha*0.4;
    ctx.fillStyle=eg;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  if(car.dmgFlash>0){
    const dg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
    dg.addColorStop(0,'rgba(255,0,0,0)');
    dg.addColorStop(1,`rgba(255,0,0,${car.dmgFlash*0.5})`);
    ctx.save();ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);ctx.restore();
  }

  ctx.restore();

  if(state==='countdown'){
    const sec=countdownT;
    const label=sec>3?'3':sec>2?'2':sec>1?'1':'GO!';
    const color=sec>3?'#44ff44':sec>2?'#ffaa00':sec>1?'#ff4444':'#ffd700';
    const frac=(sec%1+1)%1;
    ctx.save();ctx.translate(W/2,H/2-20);ctx.scale(1+frac*0.7,1+frac*0.7);
    ctx.globalAlpha=sec<1?1:Math.min(1,frac*3);
    ctx.font='bold 90px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(label,3,3);
    ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=40;ctx.fillText(label,0,0);
    ctx.restore();

    if(gameMode==='race'&&sec>1){
      ctx.save();
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 16px monospace';
      const posColors=['#ffd700','#c0c0c0','#cd7f32','#aaa'];
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(W/2-80,H/2+55,160,34,6);ctx.fill();
      ctx.fillStyle=posColors[playerGridPos-1]||'#aaa';
      ctx.fillText('GRID POSITION  P'+playerGridPos, W/2, H/2+72);
      ctx.restore();
    }
  }

  if(state==='trackselect'){
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 46px monospace';ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,0.3)';ctx.shadowBlur=18;
    ctx.fillText('SELECT TRACK',W/2,52);ctx.shadowBlur=0;

    TRACK_DEFS.forEach((td,i)=>{
      const col=2, bw=168, bh=95, gap=16;
      const totalW=col*bw+(col-1)*gap;
      const startX=(W-totalW)/2;
      const bx=startX+(i%col)*(bw+gap);
      const by=110+Math.floor(i/col)*(bh+gap);
      const sel=i===trackCursor;

      const t=buildTrack(td.raw);
      const xs=t.cen.map(p=>p.x), ys=t.cen.map(p=>p.y);
      const mnX=Math.min(...xs),mxX=Math.max(...xs),mnY=Math.min(...ys),mxY=Math.max(...ys);
      const scl=Math.min((bw-20)/(mxX-mnX),(bh-32)/(mxY-mnY));
      const offX=bx+bw/2-(mnX+mxX)/2*scl;
      const offY=by+bh/2+6-(mnY+mxY)/2*scl;

      ctx.fillStyle=sel?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.04)';
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
      if(sel){ctx.shadowColor=td.color;ctx.shadowBlur=16;}
      ctx.strokeStyle=sel?td.color:'rgba(255,255,255,0.15)';ctx.lineWidth=sel?2:1;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();ctx.shadowBlur=0;

      ctx.save();ctx.beginPath();ctx.roundRect(bx+2,by+2,bw-4,bh-4,8);ctx.clip();
      ctx.strokeStyle='rgba(80,80,80,0.6)';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(t.outer[0].x*scl+offX,t.outer[0].y*scl+offY);
      for(let k=1;k<t.SN;k++) ctx.lineTo(t.outer[k].x*scl+offX,t.outer[k].y*scl+offY);
      ctx.closePath();ctx.stroke();
      ctx.fillStyle='rgba(50,50,50,0.8)';
      const mp=new Path2D();
      mp.moveTo(t.outer[0].x*scl+offX,t.outer[0].y*scl+offY);
      for(let k=1;k<t.SN;k++) mp.lineTo(t.outer[k].x*scl+offX,t.outer[k].y*scl+offY);
      mp.closePath();
      mp.moveTo(t.inner[0].x*scl+offX,t.inner[0].y*scl+offY);
      for(let k=1;k<t.SN;k++) mp.lineTo(t.inner[k].x*scl+offX,t.inner[k].y*scl+offY);
      mp.closePath();ctx.fill(mp,'evenodd');
      ctx.strokeStyle=sel?td.color:'rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(t.cen[0].x*scl+offX,t.cen[0].y*scl+offY);
      for(let k=1;k<t.SN;k++) ctx.lineTo(t.cen[k].x*scl+offX,t.cen[k].y*scl+offY);
      ctx.closePath();ctx.stroke();ctx.setLineDash([]);
      ctx.restore();

      ctx.fillStyle=sel?td.color:'rgba(255,255,255,0.75)';
      ctx.font=`bold ${sel?13:12}px monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(td.name,bx+bw/2,by+bh-4);
    });

    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('TAP to select  ·  ESC to go back',W/2,H-24);
  }

  if(state==='difficulty'){
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 52px monospace';ctx.fillStyle='#ff3c50';ctx.shadowColor='#ff3c50';ctx.shadowBlur=24;
    ctx.fillText('SELECT DIFFICULTY',W/2,H/2-175);ctx.shadowBlur=0;

    const diffs=[
      {key:'beginner',label:'🟢 BEGINNER', sub:'Slower AI · forgiving · great for learning', color:'#44ff88'},
      {key:'normal',  label:'🟡 STANDARD', sub:'Balanced AI · fair challenge · recommended',  color:'#ffd700'},
      {key:'pro',     label:'🔴 PRO',      sub:'Ruthless AI · faster · no mercy',              color:'#ff4444'},
    ];
    diffs.forEach((d,i)=>{
      const sel=i===difficultyCursor;
      const bx=W/2-165, by=H/2-95+i*95, bw=330, bh=78;
      ctx.fillStyle=sel?d.color:'rgba(255,255,255,0.06)';ctx.globalAlpha=sel?0.18:1;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();ctx.globalAlpha=1;
      if(sel){ctx.shadowColor=d.color;ctx.shadowBlur=22;}
      ctx.strokeStyle=sel?d.color:'rgba(255,255,255,0.15)';ctx.lineWidth=sel?2.5:1;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();ctx.shadowBlur=0;
      ctx.fillStyle=sel?'#fff':'rgba(255,255,255,0.5)';
      ctx.font=`bold ${sel?24:21}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(d.label,W/2,by+28);
      ctx.fillStyle=sel?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.28)';
      ctx.font='12px monospace';ctx.fillText(d.sub,W/2,by+56);
    });
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('TAP to select  ·  ESC to go back',W/2,H/2+200);
  }

  if(state==='start'){
    ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 80px monospace';ctx.fillStyle='#ff3c50';ctx.shadowColor='#ff3c50';ctx.shadowBlur=30;
    ctx.fillText('RACER',W/2,H/2-145);ctx.shadowBlur=0;
    [{label:'⚡ RACE',sub:`${TOTAL_LAPS} laps · random grid · AI gets faster`,color:'#ff3c50'},
     {label:'⏱ PRACTICE',sub:'Solo speedrun · unlimited laps · no obstacles',color:'#44aaff'}
    ].forEach((m,i)=>{
      const sel=i===menuCursor,bx=W/2-130,by=H/2-40+i*90,bw=260,bh=72;
      ctx.fillStyle=sel?m.color:'rgba(255,255,255,0.07)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();
      if(sel){ctx.shadowColor=m.color;ctx.shadowBlur=20;}
      ctx.strokeStyle=sel?m.color:'rgba(255,255,255,0.18)';ctx.lineWidth=sel?2:1;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();ctx.shadowBlur=0;
      ctx.fillStyle=sel?'#fff':'rgba(255,255,255,0.55)';ctx.font=`bold ${sel?22:20}px monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.label,W/2,by+26);
      ctx.fillStyle=sel?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.3)';ctx.font='12px monospace';ctx.fillText(m.sub,W/2,by+52);
    });
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('TAP to start',W/2,H/2+175);
  }

  if(state==='finished'){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    const btnY=H-110;
    if(gameMode==='practice'){
      ctx.font='bold 48px monospace';ctx.fillStyle='#44aaff';ctx.shadowColor='#44aaff';ctx.shadowBlur=22;
      ctx.fillText('SESSION OVER',W/2,H/2-170);ctx.shadowBlur=0;

      const speedrunTotal = lapHistory.reduce((s,l)=>s+l.time,0);
      ctx.fillStyle=newBestSpeedrun?'#ffd700':'rgba(255,255,255,0.9)';
      ctx.font=`bold ${newBestSpeedrun?28:22}px monospace`;
      ctx.fillText((newBestSpeedrun?'🏁 NEW SPEEDRUN  ':'🏁 SPEEDRUN  ')+fmt(speedrunTotal),W/2,H/2-118);
      if(hs.bestSpeedrun){
        ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px monospace';
        ctx.fillText('BEST SPEEDRUN: '+fmt(hs.bestSpeedrun),W/2,H/2-92);
      }

      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px monospace';
      lapHistory.forEach((lh,i)=>{
        ctx.fillStyle=lh.best?'#ffd700':'rgba(255,255,255,0.7)';
        ctx.font=lh.best?'bold 12px monospace':'12px monospace';
        ctx.fillText(`L${i+1}  ${fmt(lh.time)}${lh.best?' ★':''}`,W/2-60,H/2-60+i*22);
      });

      const lbX = W/2+80;
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(lbX-10,H/2-72,130,hs.bestLaps.length*26+36,6);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 10px monospace';ctx.textAlign='left';
      ctx.fillText('🏆 TOP 3 LAPS',lbX,H/2-52);
      const medals=['🥇','🥈','🥉'];
      hs.bestLaps.forEach((t2,i)=>{
        const isNew=newBestLap&&t2===bestLap&&i===0;
        ctx.fillStyle=i===0?'#ffd700':i===1?'#c0c0c0':'#cd7f32';
        ctx.font=isNew?'bold 12px monospace':'11px monospace';
        ctx.fillText(`${medals[i]}  ${fmt(t2)}${isNew?' ◄':''}`,lbX,H/2-28+i*26);
      });
      if(!hs.bestLaps.length){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px monospace';ctx.fillText('no records yet',lbX,H/2-28);}

      ctx.textAlign='center';
      doAgainBtn=drawButton('🔁 PRACTICE AGAIN',W/2-168,btnY,158,50,'#44aaff',hitTest({x:W/2-168,y:btnY,w:158,h:50}));
      menuBtn=drawButton('🏠 MENU',W/2+10,btnY,138,50,'#888',hitTest({x:W/2+10,y:btnY,w:138,h:50}));
    } else {
      ctx.font='bold 36px monospace';ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=18;
      ctx.fillText('RACE OVER',W/2,58);ctx.shadowBlur=0;

      const sorted=results.slice().sort((a,b)=>a.time-b.time);
      const resStartY = 100;
      const resStep = 38;
      ['🥇','🥈','🥉','4th'].forEach((med,i)=>{
        if(!sorted[i]) return;
        if(sorted[i].dnf){
          ctx.font='bold 16px monospace';ctx.fillStyle='#ff4444';
          ctx.fillText('💥 YOU — DNF (WRECKED)',W/2,resStartY+i*resStep);
          return;
        }
        ctx.font=`bold ${i===0?22:16}px monospace`;
        ctx.fillStyle=['#ffd700','#c0c0c0','#cd7f32','#888'][i];
        ctx.fillText(med+'  '+sorted[i].name+'  '+fmt(sorted[i].time)+(sorted[i].isPlayer?' ← YOU':''),W/2,resStartY+i*resStep);
      });
      allCars.filter(c=>!c.finished).forEach((c,i)=>{
        ctx.font='14px monospace';ctx.fillStyle='#555';
        ctx.fillText((sorted.length+i+1)+'.  '+(c.isAI?c.name:'YOU')+'  DNF',W/2,resStartY+(sorted.length+i)*resStep);
      });
      if(bestLap<Infinity){ctx.font='11px monospace';ctx.fillStyle='#666';ctx.textAlign='center';ctx.fillText('Best lap: '+fmt(bestLap),W/2,resStartY+4*resStep+4);}

      const rMedals=['🥇','🥈','🥉'];
      const diffSections=[
        {key:'beginner', label:'🟢 BEGINNER', color:'#44ff88'},
        {key:'normal',   label:'🟡 STANDARD', color:'#ffd700'},
        {key:'pro',      label:'🔴 PRO',       color:'#ff4444'},
      ];
      const lbW=680, lbColW=lbW/3, lbX=(W-lbW)/2;
      const lbY=270, lbRowH=20, lbHeaderH=20;
      const lbH=lbHeaderH+3*lbRowH+14;
      ctx.fillStyle='rgba(0,0,0,0.72)';
      ctx.beginPath();ctx.roundRect(lbX-8,lbY-8,lbW+16,lbH+16,10);ctx.fill();
      diffSections.forEach((ds,ci)=>{
        const cx=lbX+ci*lbColW;
        const isActive=aiDifficulty===ds.key;
        const records=(hs.bestRaces[ds.key]||[]);
        if(isActive){
          ctx.fillStyle='rgba(255,255,255,0.06)';
          ctx.beginPath();ctx.roundRect(cx-2,lbY-6,lbColW,lbH+12,8);ctx.fill();
          ctx.strokeStyle=ds.color;ctx.lineWidth=1.5;
          ctx.beginPath();ctx.roundRect(cx-2,lbY-6,lbColW,lbH+12,8);ctx.stroke();
        }
        ctx.fillStyle=ds.color;ctx.font='bold 12px monospace';ctx.textAlign='center';
        ctx.fillText(ds.label, cx+lbColW/2, lbY+lbHeaderH/2+2);
        ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(cx+4,lbY+lbHeaderH+4);ctx.lineTo(cx+lbColW-4,lbY+lbHeaderH+4);ctx.stroke();
        if(records.length===0){
          ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='10px monospace';
          ctx.fillText('no records yet', cx+lbColW/2, lbY+lbHeaderH+lbRowH);
        } else {
          records.forEach((t2,ri)=>{
            const playerResult=results.find(r=>r.isPlayer&&!r.dnf);
            const isNew=newBestRace&&isActive&&playerResult&&Math.abs(t2-playerResult.time)<50;
            ctx.fillStyle=ri===0?'#ffd700':ri===1?'#c0c0c0':'#cd7f32';
            ctx.font=isNew?'bold 12px monospace':'11px monospace';
            ctx.fillText(`${rMedals[ri]} ${fmt(t2)}${isNew?' ◄':''}`,
              cx+lbColW/2, lbY+lbHeaderH+10+ri*lbRowH+lbRowH/2+4);
          });
        }
      });
      ctx.textAlign='center';
      doAgainBtn=drawButton('🔁 RACE AGAIN',W/2-158,btnY,148,50,'#ff3c50',hitTest({x:W/2-158,y:btnY,w:148,h:50}));
      menuBtn=drawButton('🏠 MENU',W/2+10,btnY,138,50,'#888',hitTest({x:W/2+10,y:btnY,w:138,h:50}));
    }
  }
}

function fmt(ms){
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

const wrapper=document.getElementById('wrapper');
let canvasScale=1;
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvasScale=s;
  wrapper.style.width=W+'px';wrapper.style.height=H+'px';
  wrapper.style.transform=`scale(${s})`;wrapper.style.position='absolute';
  wrapper.style.left=Math.round((window.innerWidth-W*s)/2)+'px';
  wrapper.style.top=Math.round((window.innerHeight-H*s)/2)+'px';
  layoutTouchUI();
}
window.addEventListener('resize',resize);

const touchUI=document.getElementById('touch-ui');
let touchVisible=true;
function showTouchUI(){touchVisible=true;touchUI.style.display='block';}
function layoutTouchUI(){
  if(!touchVisible) return;
  const pad=16, pos=(el,p)=>Object.assign(document.getElementById(el).style,p);
  pos('joystick-base',{left:`${pad}px`, bottom:`${pad}px`, top:'', right:''});
  pos('btn-drift',{right:`${pad+80}px`,  bottom:`${pad+172}px`, top:'', left:''});
  pos('btn-nitro',{right:`${pad}px`,     bottom:`${pad+172}px`, top:'', left:''});
  pos('btn-menu', {right:`${pad}px`,     top:`${pad}px`,        bottom:'', left:''});
}
function bindBtn(id,code){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[code]=true;el.classList.add('pressed');initAudio();};
  const off=e=>{e.preventDefault();keys[code]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off,{passive:false});el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
bindBtn('btn-drift','ShiftLeft');bindBtn('btn-nitro','KeyN');
const menuBtnEl=document.getElementById('btn-menu');
function menuAction(e){e.preventDefault();initAudio();stopAllSound();if(state==='racing'||state==='countdown')state='start';else if(state==='finished')state='start';}
menuBtnEl.addEventListener('touchstart',menuAction,{passive:false});menuBtnEl.addEventListener('mousedown',menuAction);

const jsCanvas = document.getElementById('joystick-base');
const jsCtx    = jsCanvas.getContext('2d');
const JS_SIZE  = 160;
const JS_R     = 58;
const JS_KNOB  = 26;
let joystickX  = 0;
let joystickY  = 0;
let jsActive   = false;
let jsCenterX  = 0, jsCenterY = 0;
let jsKnobX    = 0, jsKnobY  = 0;

function updateJoystickCenter(){
  const r = jsCanvas.getBoundingClientRect();
  jsCenterX = r.left + r.width/2;
  jsCenterY = r.top  + r.height/2;
}

function jsPointerStart(px, py){jsActive = true;updateJoystickCenter();jsPointerMove(px, py);}
function jsPointerMove(px, py){
  if(!jsActive) return;
  const dx = px - jsCenterX, dy = py - jsCenterY;
  const dist = Math.min(Math.hypot(dx, dy), JS_R);
  const ang  = Math.atan2(dy, dx);
  jsKnobX = Math.cos(ang)*dist;
  jsKnobY = Math.sin(ang)*dist;
  joystickX = jsKnobX / JS_R;
  joystickY = jsKnobY / JS_R;
}
function jsPointerEnd(){jsActive = false;jsKnobX = 0; jsKnobY = 0; joystickX = 0; joystickY = 0;}

jsCanvas.addEventListener('touchstart', e=>{e.preventDefault(); initAudio();jsPointerStart(e.touches[0].clientX, e.touches[0].clientY);},{passive:false});
jsCanvas.addEventListener('touchmove', e=>{e.preventDefault();jsPointerMove(e.touches[0].clientX, e.touches[0].clientY);},{passive:false});
jsCanvas.addEventListener('touchend',   e=>{ e.preventDefault(); jsPointerEnd(); },{passive:false});
jsCanvas.addEventListener('touchcancel',e=>{ e.preventDefault(); jsPointerEnd(); },{passive:false});
jsCanvas.addEventListener('mousedown', e=>{ initAudio(); jsPointerStart(e.clientX, e.clientY); });
window.addEventListener('mousemove',   e=>{ if(jsActive) jsPointerMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',     ()=> jsPointerEnd());

function drawSteeringWheel(){
  const c = jsCtx, cx = JS_SIZE/2, cy = JS_SIZE/2;
  c.clearRect(0, 0, JS_SIZE, JS_SIZE);
  c.beginPath(); c.arc(cx, cy, JS_R, 0, Math.PI*2);
  c.fillStyle   = 'rgba(0,0,0,0.35)';  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.18)'; c.lineWidth = 2; c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.font = '16px monospace'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText('◄', cx - JS_R + 14, cy);
  c.fillText('▶', cx + JS_R - 14, cy);
  c.fillText('▲', cx, cy - JS_R + 14);
  c.fillText('▼', cx, cy + JS_R - 14);
  c.beginPath(); c.arc(cx + jsKnobX + 2, cy + jsKnobY + 3, JS_KNOB, 0, Math.PI*2);
  c.fillStyle = 'rgba(0,0,0,0.3)'; c.fill();
  const grad = c.createRadialGradient(cx+jsKnobX-4,cy+jsKnobY-4,2, cx+jsKnobX,cy+jsKnobY, JS_KNOB);
  grad.addColorStop(0, jsActive ? 'rgba(255,200,100,0.95)' : 'rgba(200,200,200,0.9)');
  grad.addColorStop(1, jsActive ? 'rgba(200,100,0,0.9)'    : 'rgba(80,80,80,0.85)');
  c.beginPath(); c.arc(cx + jsKnobX, cy + jsKnobY, JS_KNOB, 0, Math.PI*2);
  c.fillStyle = grad; c.fill();
  c.strokeStyle = jsActive ? 'rgba(255,160,0,0.8)' : 'rgba(255,255,255,0.3)';
  c.lineWidth = 2; c.stroke();
  c.beginPath(); c.arc(cx + jsKnobX, cy + jsKnobY, 5, 0, Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.6)'; c.fill();
}

function updateWheel(){}

if(screen.orientation && screen.orientation.lock){
  screen.orientation.lock('landscape').catch(()=>{});
}

const rotateEl = document.getElementById('rotate-prompt');
function checkOrientation(){
  const isPortrait = window.innerHeight > window.innerWidth;
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 900;
  if(isPortrait && isMobile){
    rotateEl.style.display='flex';
  } else {
    rotateEl.style.display='none';
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

showTouchUI();resize();

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  const gx=(t.clientX-r.left)/canvasScale,gy=(t.clientY-r.top)/canvasScale;
  if(state==='start'){
    if(gy>=H/2-20&&gy<=H/2+42){menuCursor=0;gameMode='race';state='difficulty';}
    else if(gy>=H/2+60&&gy<=H/2+122){menuCursor=1;gameMode='practice';state='trackselect';}
    else if(menuCursor===0){gameMode='race';state='difficulty';}
    else{gameMode='practice';state='trackselect';}
  } else if(state==='difficulty'){
    for(let i=0;i<3;i++){
      const by=H/2-95+i*95,bh=78;
      if(gy>=by&&gy<=by+bh){
        difficultyCursor=i;
        aiDifficulty=['beginner','normal','pro'][i];
        state='trackselect';
        break;
      }
    }
  } else if(state==='trackselect'){
    TRACK_DEFS.forEach((td,i)=>{
      const col=2, bw=168, bh=95, gap=16;
      const totalW=col*bw+(col-1)*gap;
      const startX=(W-totalW)/2;
      const bx=startX+(i%col)*(bw+gap);
      const by=110+Math.floor(i/col)*(bh+gap);
      if(gx>=bx&&gx<=bx+bw&&gy>=by&&gy<=by+bh){
        trackCursor=i;
        applyTrack(trackCursor);rebuildTrackCanvas();beginCountdown();
      }
    });
  } else if(state==='finished'){
    const btnY=H-110;
    if(gx>=W/2-168&&gx<=W/2-10&&gy>=btnY&&gy<=btnY+50){if(gameMode==='race')state='trackselect';else beginCountdown();}
    else if(gx>=W/2+10&&gx<=W/2+148&&gy>=btnY&&gy<=btnY+50)state='start';
  }
},{passive:false});

document.getElementById('nitro-file-input').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    initAudio();
    actx.decodeAudioData(ev.target.result)
      .then(buf => {
        nitroBuffer = buf;
        document.getElementById('nitro-loader').style.display = 'none';
      })
      .catch(err => console.warn('Failed to decode nitro.mp3:', err));
  };
  reader.readAsArrayBuffer(file);
});

function loop(ts){update(ts);render(ts);requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
